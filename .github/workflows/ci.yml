name: CI

on:
  push:
    branches: [main]


  jobs:
    build:
      runs-on: ubuntu-latest


      steps:
        - name: Checkout código
          uses: actions/checkout@v4


        - name: INstalar Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'


        - name: Ejecutar app
          run: python app.py
